name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rustup (preinstalled on the runner) picks up rust-toolchain.toml automatically.
      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-targets
